name: Update VERSION.json

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: write

concurrency:
  group: update-version
  cancel-in-progress: false

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update VERSION.json
        id: update
        run: ./scripts/update-version.sh

      - name: Commit and tag update
        if: steps.update.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.update.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VERSION.json
          git commit -m "Update pi-mono to ${VERSION}"

          git push origin "HEAD:${DEFAULT_BRANCH}"

          if git ls-remote --tags --refs origin "refs/tags/${VERSION}" | grep -q .; then
            echo "Tag ${VERSION} already exists on origin"
          else
            git tag -a "${VERSION}" -m "${VERSION}"
            git push origin "refs/tags/${VERSION}"
          fi
