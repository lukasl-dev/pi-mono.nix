name: Cron

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: write

concurrency:
  group: cron
  cancel-in-progress: false

jobs:
  cron:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Generate models
        run: ./scripts/generate-models.sh

      - name: Update version
        id: update
        run: ./scripts/update-version.sh

      - name: Commit and push changes
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          changed=false

          if ! git diff --quiet --exit-code models.generated.ts; then
            git add models.generated.ts
            git commit -m "Update models"
            changed=true
          fi

          if [[ "${{ steps.update.outputs.changed }}" == "true" ]]; then
            version="${{ steps.update.outputs.version }}"
            git add VERSION.json
            git commit -m "Update pi-mono to ${version}"
            changed=true

            if ! git ls-remote --tags --refs origin "refs/tags/${version}" | grep -q .; then
              git tag -a "${version}" -m "${version}"
              git push origin "refs/tags/${version}"
            fi
          fi

          if [[ "$changed" == "true" ]]; then
            git push origin "HEAD:${DEFAULT_BRANCH}"
          else
            echo "No changes to commit"
          fi
